version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: multi_tenant_db
    ports:
      - 3306:3306
    env_file:
      - .env
    cap_add:
      - SYS_NICE
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    image: multi_tenant_api:1.0.0
    container_name: multi_tenant_api
    env_file:
      - .env
    ports:
      - "3006:3006"
    networks:
      - multi_tenant_network
    depends_on:
      db:
        condition: service_healthy

networks:
  multi_tenant_network:
    driver: bridge
volumes:
  multi_tenant_db_data: